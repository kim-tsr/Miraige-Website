<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MIR[AI]GE</title>
<meta name="description" content="Mir[AI]ge — defense by attrition. Trap AI-augmented attackers in a fake reality engineered to burn their compute."/>
<link rel="icon" href="assets/logo/mark.svg"/>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg);
               background-image: var(--sand-texture);
               color: var(--fg-1); font-family: var(--font-ui);
               scroll-behavior: smooth; }
  #root { min-height: 100vh; }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important;
        scroll-behavior: auto !important; }
    html, body { scroll-behavior: auto; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="landing/ScrollEngine.jsx"></script>
<script type="text/babel" src="landing/ChapterIndex.jsx"></script>
<script type="text/babel" src="landing/SectionDivider.jsx"></script>
<script type="text/babel" src="landing/LandingNav.jsx"></script>
<script type="text/babel" src="landing/Hero.jsx"></script>
<script type="text/babel" src="landing/SpecSheet.jsx"></script>
<script type="text/babel" src="landing/Primitives.jsx"></script>
<script type="text/babel" src="landing/Timeline.jsx"></script>
<script type="text/babel" src="landing/Diagram.jsx"></script>
<script type="text/babel" src="landing/CodeBlock.jsx"></script>
<script type="text/babel" src="landing/ConsoleSnippet.jsx"></script>
<script type="text/babel" src="landing/DoctrineQuote.jsx"></script>
<script type="text/babel" src="landing/FieldReadings.jsx"></script>
<script type="text/babel" src="landing/Invitation.jsx"></script>
<script type="text/babel" src="landing/LandingFoot.jsx"></script>

<script type="text/babel">
  function App() {
    return (
      <>
        <ScrollProgress/>
        <LandingNav/>
        <Hero/>

        <div id="chapter-principe"><Reveal y={56} dur={900}><SpecSheet/></Reveal></div>
        <SectionDivider/>

        <div id="chapter-primitives"><Reveal y={56} dur={900}><Primitives/></Reveal></div>

        <div id="chapter-anatomie"><Reveal y={56} dur={900}><Timeline/></Reveal></div>
        <SectionDivider/>

        <div id="chapter-diagramme"><Reveal y={56} dur={900}><Diagram/></Reveal></div>

        <div id="chapter-code"><Reveal y={56} dur={900}><CodeBlock/></Reveal></div>

        <div id="chapter-console"><Reveal y={56} dur={900}><ConsoleSnippet/></Reveal></div>
        <SectionDivider/>

        <div id="chapter-doctrine"><Reveal y={56} dur={900}><DoctrineQuote/></Reveal></div>

        <div id="chapter-readings"><Reveal y={56} dur={900}><FieldReadings/></Reveal></div>
        <SectionDivider/>

        <div id="chapter-invitation"><Reveal y={56} dur={900}><Invitation/></Reveal></div>
        <LandingFoot/>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
