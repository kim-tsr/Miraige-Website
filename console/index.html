<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MIR[AI]GE · Mission Control</title>
<link rel="icon" href="../assets/logo/mark.svg"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body, #root { margin: 0; padding: 0; height: 100vh; background: var(--bg-deep); overflow: hidden; }
  body { font-family: var(--font-ui); color: var(--sand-100); }
  button { font-family: inherit; }
  @keyframes mc-blip { 0%,80%,100%{opacity:1} 40%{opacity:0.35} }
  @keyframes mc-edge-pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes mc-dash { to { stroke-dashoffset: -16; } }
  @keyframes mc-flash { 0% { background: rgba(176,67,44,0.18); } 100% { background: transparent; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Atoms.jsx"></script>
<script type="text/babel" src="ConsoleNav.jsx"></script>
<script type="text/babel" src="AgentRail.jsx"></script>
<script type="text/babel" src="TopologyMap.jsx"></script>
<script type="text/babel" src="IncidentLog.jsx"></script>
<script type="text/babel" src="IncidentDetail.jsx"></script>
<script type="text/babel" src="StatusBar.jsx"></script>

<script type="text/babel">
  const { useState, useEffect, useRef, useCallback } = React;

  // ── coloured log fragments ────────────────────────────────────────
  const m = (t) => <span style={{ color: "var(--mirage-300)" }}>{t}</span>;
  const w = (t) => <span style={{ color: "var(--signal-watch)" }}>{t}</span>;
  const a = (t) => <span style={{ color: "var(--signal-alert)" }}>{t}</span>;

  // ── the phase model ───────────────────────────────────────────────
  // idle → recon → detect → decide → reroute → engaged
  const PHASE_ORDER = ["recon", "detect", "decide", "reroute", "engaged"];
  const PHASE_LABEL = {
    idle:    "En veille",
    recon:   "Reconnaissance",
    detect:  "Détection T0·T1·T2",
    decide:  "Décision A2A",
    reroute: "Reroutage L7",
    engaged: "Ghost Net engagé",
  };

  // Base demo clock = 19:42:08.000; each event timestamp advances from it.
  function tsFrom(ms) {
    const total = 8000 + ms;
    const s = Math.floor(total / 1000) % 60;
    const mm = 42 + Math.floor(total / 60000);
    const msec = total % 1000;
    return `19:${String(mm).padStart(2, "0")}:${String(s).padStart(2, "0")}.${String(msec).padStart(3, "0")}`;
  }

  // Scheduled scenario. `set` patches eased targets (rps/confidence) or
  // direct metrics (latency/session). Times are ms after launch.
  const SCENARIO = [
    { t: 0,    phase: "recon",   level: "OK",    body: <>attaque entrante · sentinel-1 miroir edge depuis {m("198.51.100.7")}</>, set: { rps: 12 } },
    { t: 500,  phase: "recon",   level: "WATCH", body: <>sentinel-1 rate={w("23 req/10s")} · kind={w("ai-recon")}</>, set: { rps: 23 } },
    { t: 1000, phase: "recon",   level: "WATCH", body: <>énumération {m("/.env")} {m("/.aws/credentials")} {m("/api/v1/scan_segment")}</> },
    { t: 1500, phase: "detect",  level: "OK",    body: <>Tier 0 · Suricata signature {w("ET SCAN Nuclei/gobuster")}</> },
    { t: 2050, phase: "detect",  level: "WATCH", body: <>Tier 1 · XGBoost CIC-IDS score={w("0.71")} · inter-arrival {w("< 1.7 s")}</>, set: { rps: 38, confidence: 0.71 } },
    { t: 2600, phase: "detect",  level: "WATCH", body: <>canari PI touché {w("/admin/acknowledge")} · agent LLM confirmé</>, highlight: true, set: { rps: 47 } },
    { t: 3150, phase: "detect",  level: "ALERT", body: <>Tier 2 · Llama-3.1-8B confidence={a("0.93")} · vector={a("ai-recon")}</>, highlight: true, set: { confidence: 0.93 } },
    { t: 3800, phase: "decide",  level: "GHOST", body: <>A2A HMAC signé → orchestrator-1 · décision {m("MTD reroute")}</>, highlight: true },
    { t: 4350, phase: "decide",  level: "OK",    body: <>MCP {m("route_to_ghost_shell")} · persona={m("portal_ovh")} · netns/TLS/DNS isolés</> },
    { t: 5000, phase: "reroute", level: "OK",    body: <>L7 PATCH Octavia · XFF STARTS_WITH {m("198.51.100.")} → {m("ghost_shell")}</>, highlight: true, set: { latency: "2.94 s" } },
    { t: 5550, phase: "reroute", level: "GHOST", body: <>session {m("s_x9k2")} ouverte · TTL 30 min · production {m("intacte")}</>, set: { session: "s_x9k2 · portal_ovh" } },
    { t: 6200, phase: "engaged", level: "GHOST", body: <>engagement {m("inc-0094")} actif · {m("14")} mécanismes armés · le budget compute brûle</>, highlight: true },
  ];

  const IDLE_LOG = [
    { ts: "19:41:58.110", level: "OK", body: <>route {m("198.51.100.0/24")} → {m("octavia-lb-001")} · trafic légitime</> },
    { ts: "19:41:59.834", level: "OK", body: <>sentinel-1 rate={m("4 req/s")} · Tier 0 clear · système nominal</> },
    { ts: "19:42:01.220", level: "OK", body: <>A2A HMAC handshake sentinel-3 ↔ orchestrator-1 · 9 agents</> },
  ];

  const IDLE_METRICS = { rps: 4, confidence: 0, tokens: 0, ratio: 1, latency: "—", session: "—" };

  function agentsFor(phase) {
    const hot = phase !== "idle";
    const engaged = phase === "engaged";
    return [
      { id: "o1", kind: "orchestrator", name: "orchestrator-1", meta: "A2A HMAC coordinator", status: hot ? "busy" : "healthy" },
      { id: "s1", kind: "observer", name: "sentinel-1", meta: "edge · Tier 0 Suricata", status: hot ? "watch" : "healthy" },
      { id: "s2", kind: "observer", name: "sentinel-2", meta: "Tier 1 · XGBoost CIC-IDS", status: ["detect","decide","reroute","engaged"].includes(phase) ? "watch" : "healthy" },
      { id: "s3", kind: "observer", name: "sentinel-3", meta: "Tier 2 · Llama-3.1-8B", status: ["detect","decide","reroute","engaged"].includes(phase) ? "alert" : "healthy" },
      { id: "s4", kind: "observer", name: "sentinel-4", meta: "canari PI · /admin/ack", status: ["detect","decide","reroute","engaged"].includes(phase) ? "alert" : "healthy" },
      { id: "g1", kind: "ghost", name: "s_x9k2", meta: engaged ? "persona portal OVH · live" : "persona portal OVH · idle", status: engaged ? "alert" : "healthy" },
      { id: "g2", kind: "ghost", name: "s_p4mn", meta: "persona k8s API · idle", status: "healthy" },
    ];
  }

  function App() {
    const [tab, setTab] = useState("Console");
    const [agent, setAgent] = useState("o1");
    const [phase, setPhase] = useState("idle");
    const [log, setLog] = useState(IDLE_LOG);
    const [metrics, setMetrics] = useState(IDLE_METRICS);
    const [spark, setSpark] = useState([2, 3, 2, 4, 3, 5, 4]);
    const [clock, setClock] = useState("19:42:08");

    const timers = useRef([]);
    const ticker = useRef(null);
    const targets = useRef({ rps: 4, confidence: 0, ratio: 1 });
    const phaseRef = useRef("idle");
    const sparkRef = useRef([2, 3, 2, 4, 3, 5, 4]);
    const tickN = useRef(0);

    const clearAll = useCallback(() => {
      timers.current.forEach(clearTimeout);
      timers.current = [];
      if (ticker.current) { clearInterval(ticker.current); ticker.current = null; }
    }, []);

    const reset = useCallback(() => {
      clearAll();
      phaseRef.current = "idle";
      targets.current = { rps: 4, confidence: 0, ratio: 1 };
      sparkRef.current = [2, 3, 2, 4, 3, 5, 4];
      setPhase("idle");
      setLog(IDLE_LOG);
      setMetrics(IDLE_METRICS);
      setSpark([2, 3, 2, 4, 3, 5, 4]);
    }, [clearAll]);

    const launch = useCallback(() => {
      clearAll();
      phaseRef.current = "recon";
      targets.current = { rps: 12, confidence: 0, ratio: 1 };
      sparkRef.current = [2, 3, 2, 4, 3, 5, 4];
      tickN.current = 0;
      setPhase("recon");
      setLog([]);
      setMetrics(IDLE_METRICS);

      SCENARIO.forEach((ev) => {
        const id = setTimeout(() => {
          phaseRef.current = ev.phase;
          setPhase(ev.phase);
          setLog((L) => [...L, { ts: tsFrom(ev.t), level: ev.level, body: ev.body, highlight: ev.highlight }]);
          if (ev.set) {
            if (ev.set.rps !== undefined) targets.current.rps = ev.set.rps;
            if (ev.set.confidence !== undefined) targets.current.confidence = ev.set.confidence;
            const direct = {};
            if (ev.set.latency !== undefined) direct.latency = ev.set.latency;
            if (ev.set.session !== undefined) direct.session = ev.set.session;
            if (Object.keys(direct).length) setMetrics((M) => ({ ...M, ...direct }));
          }
          if (ev.phase === "engaged") targets.current.ratio = 23;
        }, ev.t);
        timers.current.push(id);
      });

      // Easing + token-burn ticker.
      ticker.current = setInterval(() => {
        tickN.current += 1;
        setMetrics((M) => {
          const ease = (cur, tgt) => cur + (tgt - cur) * 0.16;
          const rps = ease(M.rps, targets.current.rps);
          const confidence = ease(M.confidence, targets.current.confidence);
          const ratio = ease(M.ratio, targets.current.ratio);
          let tokens = M.tokens;
          const p = phaseRef.current;
          if (p === "engaged") tokens += 240 + Math.random() * 320;
          else if (p === "detect" || p === "decide" || p === "reroute") tokens += 28 + Math.random() * 46;
          return { ...M, rps, confidence, ratio, tokens };
        });
        if (tickN.current % 3 === 0) {
          setMetrics((M) => {
            const arr = [...sparkRef.current, Math.max(1, M.tokens || M.rps)].slice(-22);
            sparkRef.current = arr;
            setSpark(arr);
            return M;
          });
        }
      }, 120);
    }, [clearAll]);

    // Wall clock (always ticking, fictional 19:42 base).
    useEffect(() => {
      let s = 8;
      const id = setInterval(() => {
        s = (s + 1) % 60;
        setClock(`19:42:${String(s).padStart(2, "0")}`);
      }, 1000);
      return () => clearInterval(id);
    }, []);

    // Autoplay when reached via /demo (?autoplay=1) — and clean up on unmount.
    useEffect(() => {
      const auto = new URLSearchParams(window.location.search).get("autoplay");
      let id;
      if (auto === "1" || auto === "true") id = setTimeout(launch, 700);
      return () => { if (id) clearTimeout(id); clearAll(); };
    }, [launch, clearAll]);

    const running = phase !== "idle" && phase !== "engaged";

    return (
      <div style={{ display: "grid", gridTemplateRows: "56px 1fr 28px", height: "100vh" }}>
        <ConsoleNav activeTab={tab} onTab={setTab} clock={clock} phase={phase} phaseLabel={PHASE_LABEL[phase]}/>
        <main style={{ display: "grid", gridTemplateColumns: "220px 1fr 340px", minHeight: 0 }}>
          <AgentRail agents={agentsFor(phase)} selectedId={agent} onSelect={setAgent}/>
          <div style={{ display: "grid", gridTemplateRows: "1fr 280px", minHeight: 0 }}>
            <TopologyMap phase={phase}/>
            <IncidentLog entries={log}/>
          </div>
          <IncidentDetail
            incident={{ id: "inc-0094" }}
            phase={phase}
            phaseOrder={PHASE_ORDER}
            phaseLabel={PHASE_LABEL}
            metrics={metrics}
            spark={spark}
            running={running}
            onLaunch={launch}
            onReset={reset}
          />
        </main>
        <StatusBar phase={phase}/>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
