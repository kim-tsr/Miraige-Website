<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" font-family="Space Grotesk, system-ui, sans-serif" role="img" aria-label="MTD rotation lifecycle">
  <defs>
    <marker id="lcAr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#3A2F20"></path>
    </marker>
  </defs>

  <rect width="1200" height="420" fill="#FBF7EE"></rect>

  <text x="48" y="48" font-family="Space Grotesk, sans-serif" font-weight="500" font-size="11" letter-spacing="2.4" fill="#5E4E36">FIGURE 03 · LIFECYCLE</text>
  <text x="48" y="82" font-family="Rajdhani, sans-serif" font-weight="500" font-size="24" letter-spacing="0.5" fill="#0F0B05">MTD incident lifecycle — from signal to closure</text>
  <line x1="48" y1="100" x2="1152" y2="100" stroke="#3A2F20" stroke-opacity="0.28" stroke-width="1"></line>

  
  <line x1="120" y1="240" x2="1080" y2="240" stroke="#3A2F20" stroke-opacity="0.22" stroke-width="1"></line>

  
  <g transform="translate(120, 160)">
    <circle cx="60" cy="80" r="42" fill="#FBF7EE" stroke="#C99441" stroke-width="2"></circle>
    
    <g transform="translate(36, 74)" stroke="#C99441" stroke-width="1.8" fill="none" stroke-linecap="round">
      <polyline points="0,6 6,6 10,-4 16,16 22,-2 28,10 36,6 48,6"></polyline>
    </g>
    <text x="60" y="146" text-anchor="middle" font-family="Syncopate, sans-serif" font-weight="700" font-size="11" letter-spacing="2" fill="#C99441">01</text>
    <text x="60" y="170" text-anchor="middle" font-family="Rajdhani, sans-serif" font-weight="600" font-size="20" letter-spacing="0.4" fill="#0F0B05">Signal</text>
    <text x="60" y="190" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#5E4E36">score ≥ 0.85</text>
  </g>

  <line x1="240" y1="240" x2="280" y2="240" stroke="#3A2F20" stroke-width="1.4" marker-end="url(#lcAr)"></line>

  
  <g transform="translate(300, 160)">
    <circle cx="60" cy="80" r="42" fill="#FBF7EE" stroke="#B0432C" stroke-width="2"></circle>
    
    <g transform="translate(36, 56)" stroke="#B0432C" stroke-width="1.8" fill="none" stroke-linecap="round">
      <rect x="3" y="3" width="42" height="42" rx="2"></rect>
      <polyline points="14,25 22,33 36,17"></polyline>
    </g>
    <text x="60" y="146" text-anchor="middle" font-family="Syncopate, sans-serif" font-weight="700" font-size="11" letter-spacing="2" fill="#B0432C">02</text>
    <text x="60" y="170" text-anchor="middle" font-family="Rajdhani, sans-serif" font-weight="600" font-size="20" letter-spacing="0.4" fill="#0F0B05">Confirm</text>
    <text x="60" y="190" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#5E4E36">incident · 312 ms</text>
  </g>

  <line x1="420" y1="240" x2="460" y2="240" stroke="#3A2F20" stroke-width="1.4" marker-end="url(#lcAr)"></line>

  
  <g transform="translate(480, 160)">
    <circle cx="60" cy="80" r="42" fill="#FBF7EE" stroke="#7C6FA8" stroke-width="2"></circle>
    
    <g transform="translate(34, 60)" stroke="#7C6FA8" stroke-width="1.6" fill="none">
      <rect x="0" y="0" width="52" height="14" rx="2"></rect>
      <line x1="8" y1="4" x2="8" y2="10"></line>
      <line x1="16" y1="4" x2="16" y2="10"></line>
      <line x1="24" y1="4" x2="24" y2="10"></line>
      <line x1="32" y1="4" x2="32" y2="10"></line>
      <line x1="40" y1="4" x2="40" y2="10"></line>
      <rect x="0" y="22" width="52" height="14" rx="2" stroke-dasharray="3 2"></rect>
      <line x1="8" y1="26" x2="8" y2="32" stroke-dasharray="2 2"></line>
      <line x1="16" y1="26" x2="16" y2="32" stroke-dasharray="2 2"></line>
      <line x1="24" y1="26" x2="24" y2="32" stroke-dasharray="2 2"></line>
      <line x1="32" y1="26" x2="32" y2="32" stroke-dasharray="2 2"></line>
      <line x1="40" y1="26" x2="40" y2="32" stroke-dasharray="2 2"></line>
    </g>
    <text x="60" y="146" text-anchor="middle" font-family="Syncopate, sans-serif" font-weight="700" font-size="11" letter-spacing="2" fill="#7C6FA8">03</text>
    <text x="60" y="170" text-anchor="middle" font-family="Rajdhani, sans-serif" font-weight="600" font-size="20" letter-spacing="0.4" fill="#0F0B05">Clone</text>
    <text x="60" y="190" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#5E4E36">2.4 GiB · MCP</text>
  </g>

  <line x1="600" y1="240" x2="640" y2="240" stroke="#3A2F20" stroke-width="1.4" marker-end="url(#lcAr)"></line>

  
  <g transform="translate(660, 160)">
    <circle cx="60" cy="80" r="42" fill="#FBF7EE" stroke="#4FA08F" stroke-width="2"></circle>
    
    <g transform="translate(30, 56)" stroke="#4FA08F" stroke-width="1.8" fill="none" stroke-linecap="round">
      <line x1="30" y1="6" x2="6" y2="22"></line>
      <polyline points="10,18 6,22 12,24"></polyline>
      <line x1="30" y1="6" x2="54" y2="22"></line>
      <polyline points="50,18 54,22 48,24"></polyline>
      <line x1="30" y1="26" x2="30" y2="46"></line>
      <polyline points="26,42 30,46 34,42"></polyline>
    </g>
    <text x="60" y="146" text-anchor="middle" font-family="Syncopate, sans-serif" font-weight="700" font-size="11" letter-spacing="2" fill="#4FA08F">04</text>
    <text x="60" y="170" text-anchor="middle" font-family="Rajdhani, sans-serif" font-weight="600" font-size="20" letter-spacing="0.4" fill="#0F0B05">Divert + Rotate</text>
    <text x="60" y="190" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#5E4E36">/24 → /24&#39;</text>
  </g>

  <line x1="780" y1="240" x2="820" y2="240" stroke="#3A2F20" stroke-width="1.4" marker-end="url(#lcAr)"></line>

  
  <g transform="translate(840, 160)">
    <circle cx="60" cy="80" r="42" fill="#FBF7EE" stroke="#6B8E3D" stroke-width="2"></circle>
    
    <g transform="translate(34, 64)" stroke="#6B8E3D" stroke-width="1.8" fill="none" stroke-linecap="round">
      <path d="M 0 16 Q 26 -4 52 16 Q 26 36 0 16 Z"></path>
      <circle cx="26" cy="16" r="6"></circle>
      <circle cx="26" cy="16" r="2.4" fill="#6B8E3D"></circle>
    </g>
    <text x="60" y="146" text-anchor="middle" font-family="Syncopate, sans-serif" font-weight="700" font-size="11" letter-spacing="2" fill="#6B8E3D">05</text>
    <text x="60" y="170" text-anchor="middle" font-family="Rajdhani, sans-serif" font-weight="600" font-size="20" letter-spacing="0.4" fill="#0F0B05">Observe + Close</text>
    <text x="60" y="190" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#5E4E36">avg. 11 min</text>
  </g>

  
  <g transform="translate(48, 370)">
    <text x="0" y="0" font-family="Space Grotesk, sans-serif" font-weight="500" font-size="10.5" letter-spacing="2.2" fill="#5E4E36">SLO INTERNE</text>
    <text x="0" y="20" font-family="Rajdhani, sans-serif" font-weight="500" font-size="22" letter-spacing="0.4" fill="#0F0B05">Closure en moins de 5 s</text>
    <text x="280" y="0" font-family="Space Grotesk, sans-serif" font-weight="500" font-size="10.5" letter-spacing="2.2" fill="#5E4E36">MESURÉ</text>
    <text x="280" y="20" font-family="Rajdhani, sans-serif" font-weight="500" font-size="22" letter-spacing="0.4" fill="#4FA08F">2,84 s — détection à rotation</text>
  </g>
</svg>