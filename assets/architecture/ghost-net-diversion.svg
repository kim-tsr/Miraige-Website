<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Space Grotesk, system-ui, sans-serif" role="img" aria-label="Architecture Mir[AI]ge : detection, decision et reroutage L7 vers le Ghost Shell">
  <defs>
    <marker id="dvLeg" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#6B8E3D"></path>
    </marker>
    <marker id="dvHos" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#B0432C"></path>
    </marker>
    <marker id="dvCtl" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#4FA08F"></path>
    </marker>
    <marker id="dvLog" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#8C7651"></path>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#FBF7EE"></rect>

  <text x="48" y="48" font-weight="500" font-size="11" letter-spacing="2.4" fill="#5E4E36">FIGURE 02 · ARCHITECTURE COMPLETE</text>
  <text x="48" y="82" font-family="Rajdhani, sans-serif" font-weight="500" font-size="24" letter-spacing="0.5" fill="#0F0B05">Du log au leurre : détection, décision, reroutage L7</text>
  <line x1="48" y1="100" x2="1152" y2="100" stroke="#3A2F20" stroke-opacity="0.28" stroke-width="1"></line>

  <!-- ================= INTERNET (sources) ================= -->
  <rect x="48" y="140" width="180" height="300" fill="#FBF7EE" stroke="#3A2F20" stroke-opacity="0.28" stroke-width="1"></rect>
  <text x="62" y="166" font-weight="500" font-size="10.5" letter-spacing="2.3" fill="#5E4E36">INTERNET</text>

  <!-- client -->
  <g transform="translate(114, 184)">
    <rect x="0" y="0" width="48" height="44" fill="#FBF7EE" stroke="#3A2F20" stroke-width="1.4"></rect>
    <line x1="0" y1="10" x2="48" y2="10" stroke="#3A2F20" stroke-width="1.4"></line>
    <circle cx="6" cy="5" r="0.9" fill="#3A2F20"></circle>
    <circle cx="11" cy="5" r="0.9" fill="#3A2F20"></circle>
    <text x="24" y="62" text-anchor="middle" font-weight="600" font-size="13" fill="#0F0B05">client</text>
    <text x="24" y="78" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#5E4E36">trafic légitime</text>
  </g>

  <!-- attaquant -->
  <g transform="translate(114, 324)">
    <rect x="0" y="0" width="48" height="44" fill="#FBF7EE" stroke="#B0432C" stroke-width="1.4"></rect>
    <line x1="0" y1="10" x2="48" y2="10" stroke="#B0432C" stroke-width="1.4"></line>
    <text x="24" y="62" text-anchor="middle" font-weight="600" font-size="13" fill="#B0432C">agent IA hostile</text>
    <text x="24" y="78" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#5E4E36">scan automatisé</text>
  </g>

  <!-- ================= LOAD BALANCER (pivot) ================= -->
  <rect x="330" y="220" width="180" height="150" fill="#FBF7EE" stroke="#3A2F20" stroke-width="1.4"></rect>
  <text x="346" y="246" font-weight="500" font-size="10.5" letter-spacing="2.3" fill="#5E4E36">LOAD BALANCER</text>
  <g transform="translate(346, 262)">
    <rect x="0" y="0" width="60" height="32" rx="2" fill="#FBF7EE" stroke="#3A2F20" stroke-width="1.4"></rect>
    <line x1="12" y1="6" x2="12" y2="26" stroke="#3A2F20"></line>
    <line x1="24" y1="6" x2="24" y2="26" stroke="#3A2F20"></line>
    <line x1="36" y1="6" x2="36" y2="26" stroke="#3A2F20"></line>
    <line x1="48" y1="6" x2="48" y2="26" stroke="#3A2F20"></line>
  </g>
  <text x="346" y="322" font-weight="600" font-size="13" fill="#0F0B05">octavia-lb</text>
  <text x="346" y="340" font-family="JetBrains Mono, monospace" font-size="10" fill="#5E4E36">règle L7 · cookie signé</text>
  <text x="346" y="356" font-family="JetBrains Mono, monospace" font-size="10" fill="#5E4E36">OpenStack Octavia</text>

  <!-- ================= PRODUCTION ================= -->
  <rect x="950" y="160" width="202" height="120" fill="#FBF7EE" stroke="#3A2F20" stroke-opacity="0.28" stroke-width="1"></rect>
  <text x="964" y="186" font-weight="500" font-size="10.5" letter-spacing="2.3" fill="#5E4E36">PRODUCTION</text>
  <g transform="translate(1021, 202)">
    <rect x="0" y="0" width="60" height="32" rx="2" fill="#FBF7EE" stroke="#3A2F20" stroke-width="1.4"></rect>
    <line x1="10" y1="6" x2="10" y2="26" stroke="#3A2F20"></line>
    <line x1="20" y1="6" x2="20" y2="26" stroke="#3A2F20"></line>
    <line x1="30" y1="6" x2="30" y2="26" stroke="#3A2F20"></line>
    <line x1="40" y1="6" x2="40" y2="26" stroke="#3A2F20"></line>
    <line x1="50" y1="6" x2="50" y2="26" stroke="#3A2F20"></line>
    <text x="30" y="50" text-anchor="middle" font-weight="600" font-size="13" fill="#0F0B05">production</text>
    <text x="30" y="66" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#3A2F20">réseau privé · intacte</text>
  </g>

  <!-- ================= GHOST SHELL ================= -->
  <rect x="950" y="480" width="202" height="140" fill="#EEE9F5" stroke="#7C6FA8" stroke-width="1.2" stroke-dasharray="4 3"></rect>
  <text x="964" y="506" font-weight="500" font-size="10.5" letter-spacing="2.3" fill="#7C6FA8">GHOST SHELL · LEURRE</text>
  <g transform="translate(1021, 522)">
    <rect x="0" y="0" width="60" height="32" rx="2" fill="#F4F1F9" stroke="#7C6FA8" stroke-width="1.4" stroke-dasharray="3 2"></rect>
    <line x1="12" y1="6" x2="12" y2="26" stroke="#7C6FA8" stroke-dasharray="2 2"></line>
    <line x1="24" y1="6" x2="24" y2="26" stroke="#7C6FA8" stroke-dasharray="2 2"></line>
    <line x1="36" y1="6" x2="36" y2="26" stroke="#7C6FA8" stroke-dasharray="2 2"></line>
    <line x1="48" y1="6" x2="48" y2="26" stroke="#7C6FA8" stroke-dasharray="2 2"></line>
    <text x="30" y="50" text-anchor="middle" font-weight="600" font-size="13" fill="#7C6FA8">1 container</text>
    <text x="30" y="66" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#7C6FA8">4 personas · procédural</text>
  </g>

  <!-- ================= PLAN DE CONTROLE ================= -->
  <rect x="300" y="470" width="600" height="150" fill="#15110A" stroke="#EFE5D2" stroke-opacity="0.22" stroke-width="1"></rect>
  <text x="316" y="494" font-weight="500" font-size="10.5" letter-spacing="2.3" fill="#EFE5D2">PLAN DE CONTRÔLE</text>

  <!-- sentinel -->
  <g transform="translate(322, 510)">
    <rect x="0" y="0" width="160" height="90" fill="#1D1810" stroke="#C99441" stroke-width="1.2"></rect>
    <text x="14" y="24" font-weight="600" font-size="13" fill="#EFE5D2">sentinel</text>
    <text x="14" y="42" font-family="JetBrains Mono, monospace" font-size="10" fill="#C99441">détection en cascade</text>
    <text x="14" y="58" font-family="JetBrains Mono, monospace" font-size="10" fill="#C99441">Sigma → ML → LLM</text>
    <text x="14" y="76" font-family="JetBrains Mono, monospace" font-size="10" fill="#8C7651">+ canary PI</text>
  </g>

  <!-- orchestrator -->
  <g transform="translate(522, 510)">
    <rect x="0" y="0" width="170" height="90" fill="#1D1810" stroke="#4FA08F" stroke-width="1.2"></rect>
    <text x="14" y="24" font-weight="600" font-size="13" fill="#EFE5D2">orchestrator</text>
    <text x="14" y="42" font-family="JetBrains Mono, monospace" font-size="10" fill="#8EC9BC">décide · seuil ≥ 0,75</text>
    <text x="14" y="58" font-family="JetBrains Mono, monospace" font-size="10" fill="#8EC9BC">FSM · TTL 30 min</text>
    <text x="14" y="76" font-family="JetBrains Mono, monospace" font-size="10" fill="#8C7651">seul habilité à agir</text>
  </g>

  <!-- mcp -->
  <g transform="translate(732, 510)">
    <rect x="0" y="0" width="148" height="90" fill="#1D1810" stroke="#8EC9BC" stroke-width="1.2"></rect>
    <text x="14" y="24" font-weight="600" font-size="13" fill="#EFE5D2">serveur MCP</text>
    <text x="14" y="42" font-family="JetBrains Mono, monospace" font-size="10" fill="#8EC9BC">3 outils scopés</text>
    <text x="14" y="58" font-family="JetBrains Mono, monospace" font-size="10" fill="#8EC9BC">API OVH</text>
    <text x="14" y="76" font-family="JetBrains Mono, monospace" font-size="10" fill="#8C7651">rien d'autre</text>
  </g>

  <!-- ================= FLUX ================= -->

  <!-- client -> LB -->
  <path d="M 166 206 L 270 206 L 270 265 L 324 265" fill="none" stroke="#6B8E3D" stroke-width="2" marker-end="url(#dvLeg)"></path>
  <!-- attaquant -> LB -->
  <path d="M 166 346 L 270 346 L 270 325 L 324 325" fill="none" stroke="#B0432C" stroke-width="2" marker-end="url(#dvHos)"></path>
  <text x="62" y="420" font-size="11" fill="#B0432C">tout entre par le même LB</text>

  <!-- LB -> production (légitime) -->
  <path d="M 512 250 L 740 250 L 740 220 L 944 220" fill="none" stroke="#6B8E3D" stroke-width="2" marker-end="url(#dvLeg)"></path>
  <text x="560" y="240" font-size="11.5" fill="#6B8E3D">flux légitime · jamais dérouté</text>

  <!-- LB -> ghost (hostile, après bascule) -->
  <path d="M 512 340 L 924 340 L 924 540 L 944 540" fill="none" stroke="#B0432C" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#dvHos)"></path>
  <text x="560" y="330" font-size="11.5" fill="#B0432C">⑤ session hostile basculée · elle ne voit aucune différence</text>

  <!-- LB -> sentinel (logs) -->
  <path d="M 380 372 L 380 506" fill="none" stroke="#8C7651" stroke-width="1.6" stroke-dasharray="3 3" marker-end="url(#dvLog)"></path>
  <text x="246" y="430" font-size="11.5" fill="#8C7651">① logs en miroir</text>
  <text x="246" y="446" font-size="11.5" fill="#8C7651">(fenêtre 10 s)</text>

  <!-- sentinel -> orchestrator -->
  <path d="M 484 555 L 518 555" fill="none" stroke="#4FA08F" stroke-width="1.8" marker-end="url(#dvCtl)"></path>
  <!-- orchestrator -> mcp -->
  <path d="M 694 555 L 728 555" fill="none" stroke="#4FA08F" stroke-width="1.8" marker-end="url(#dvCtl)"></path>

  <!-- mcp -> LB (PATCH) -->
  <path d="M 806 506 L 806 430 L 470 430 L 470 374" fill="none" stroke="#4FA08F" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#dvCtl)"></path>
  <text x="560" y="422" font-size="11.5" fill="#2C6E62">④ un seul PATCH L7, ciblé sur le cookie · ≈ 3 s au total</text>

  <!-- step labels control plane -->
  <text x="330" y="640" font-size="11.5" fill="#5E4E36">② détecte l'agent IA</text>
  <text x="540" y="640" font-size="11.5" fill="#5E4E36">③ alerte A2A signée HMAC → décide</text>
  <text x="772" y="640" font-size="11.5" fill="#5E4E36">appelle l'API OVH</text>

  <!-- ================= LEGENDE ================= -->
  <g transform="translate(48, 676)">
    <line x1="0" y1="-4" x2="32" y2="-4" stroke="#6B8E3D" stroke-width="2" marker-end="url(#dvLeg)"></line>
    <text x="40" y="0" font-size="11" fill="#5E4E36">flux légitime</text>

    <line x1="150" y1="-4" x2="182" y2="-4" stroke="#B0432C" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#dvHos)"></line>
    <text x="190" y="0" font-size="11" fill="#5E4E36">flux hostile (après bascule)</text>

    <line x1="380" y1="-4" x2="412" y2="-4" stroke="#4FA08F" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#dvCtl)"></line>
    <text x="420" y="0" font-size="11" fill="#5E4E36">plan de contrôle (A2A · MCP)</text>

    <line x1="620" y1="-4" x2="652" y2="-4" stroke="#8C7651" stroke-width="1.6" stroke-dasharray="3 3" marker-end="url(#dvLog)"></line>
    <text x="660" y="0" font-size="11" fill="#5E4E36">observation (logs)</text>

    <rect x="810" y="-12" width="14" height="14" fill="none" stroke="#7C6FA8" stroke-width="1.2" stroke-dasharray="3 2"></rect>
    <text x="832" y="0" font-size="11" fill="#5E4E36">périmètre du leurre</text>
  </g>
</svg>
